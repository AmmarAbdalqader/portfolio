name: portfolio
description: "Ammar AbdAlQader - Senior Flutter Developer Portfolio"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_web_plugins:
    sdk: flutter
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.3.0
  provider: ^6.1.1
  url_launcher: ^6.2.4
  visibility_detector: ^0.4.0+2
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/